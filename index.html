<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Elephant in the Room</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="pause-button-container">
      <button id="pause-button" aria-label="Pause game">⏸️</button>
    </div>
    <div id="game-container">
        <!-- Preload the spritesheet -->
        <img src="/eitr_spritesheet.png" id="furniture-spritesheet" style="display: none;">
        <img src="/eitr_albumcover.jpg" id="album-cover" style="display: none;">      
        <div id="splash-screen">
            <div class="splash-image-container">
                <img src="/eitr_albumcover.jpg" alt="The Elephant in the Room">
                <button id="start-btn">HIDE</button>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        <div id="game-over" class="hidden">
            <h2>Game Over!</h2>
            <p>You were spotted by a human.</p>
            <p>Your score: <span id="final-score">0</span></p>
            <button id="restart-btn">Play Again</button>
        </div>
        <div id="hud">
            <div id="score">Score: 0</div>
        </div>
        <div id="speed-boost-indicator">Speed Boost Active!</div>
        <div id="vision-reduction-indicator">Human Vision Reduced!</div>
    </div>
    <script type="module" src="game.js"></script>
</body>
</html>
